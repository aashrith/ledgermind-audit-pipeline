# LedgerMind Audit Pipeline — full local stack.
#   docker compose up --build
# Then open the dashboard at http://localhost:8080
#
# Services: MongoDB, API server, enrichment worker (+ sweeper/reaper), a one-shot seed,
# and the nginx-served client (which proxies /api to the server).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    image: ledgermind-server:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '4000'
      MONGODB_URI: mongodb://mongo:27017/ledgermind
      MODEL_VERSION: v1
      RISK_VERSION: v1
    ports:
      - '4000:4000'
    depends_on:
      mongo:
        condition: service_healthy

  worker:
    image: ledgermind-server:local
    build: ./server
    restart: unless-stopped
    command: ['npm', 'run', 'start:worker']
    environment:
      MONGODB_URI: mongodb://mongo:27017/ledgermind
      MODEL_VERSION: v1
      RISK_VERSION: v1
    depends_on:
      mongo:
        condition: service_healthy

  seed:
    image: ledgermind-server:local
    build: ./server
    command: ['npm', 'run', 'seed']
    environment:
      MONGODB_URI: mongodb://mongo:27017/ledgermind
    depends_on:
      mongo:
        condition: service_healthy
    restart: 'no'

  client:
    build: ./client
    image: ledgermind-client:local
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - server

volumes:
  mongo-data:
